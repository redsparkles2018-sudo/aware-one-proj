<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Aware One icon">
  <title>Aware One — A1 Icon</title>
  <rect width="100" height="100" rx="20" fill="#00A99D"/>
  <!-- A — centred slightly left to leave shoulder room for 1 -->
  <text
    x="20" y="78"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="64"
    fill="white"
    letter-spacing="-0.03em">A</text>
  <!-- 1 — tight superscript, hugs the top-right of A -->
  <text
    x="62" y="40"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="600"
    font-size="26"
    fill="rgba(255,255,255,0.92)">1</text>
</svg>
