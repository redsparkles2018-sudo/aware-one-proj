<!-- Square social avatar — LinkedIn, Twitter/X, profile photos -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Aware One</title>
  <!-- Background -->
  <rect width="400" height="400" rx="0" fill="#1E2B3C"/>
  <!-- Teal accent bar at top -->
  <rect width="400" height="8" fill="#00A99D"/>
  <!-- Centered A icon -->
  <rect x="140" y="100" width="120" height="120" rx="22" fill="#00A99D"/>
  <!-- A letterform inside icon -->
  <polygon points="160,204 178,148 186,148 204,204 194,204 182,168 170,204" fill="white"/>
  <rect x="166" y="184" width="24" height="7" rx="1.5" fill="#00A99D"/>
  <text x="196" y="172" font-family="'Inter', system-ui, sans-serif" font-weight="700" font-size="28" fill="white">1</text>
  <!-- Wordmark below -->
  <text x="200" y="280"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="48"
    fill="white"
    letter-spacing="-0.02em">AWARE</text>
  <text x="200" y="328"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="300"
    font-size="36"
    fill="#00C4B7"
    letter-spacing="0.15em">ONE</text>
</svg>
