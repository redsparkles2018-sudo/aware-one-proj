<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Aware One</title>
  <!-- Background -->
  <rect width="400" height="400" fill="#1E2B3C"/>
  <!-- Teal accent bar at top -->
  <rect width="400" height="10" fill="#00A99D"/>

  <!-- A¹ icon block — centred -->
  <rect x="130" y="90" width="140" height="140" rx="28" fill="#00A99D"/>
  <!-- A text -->
  <text
    x="148" y="208"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="130"
    fill="white"
    letter-spacing="-0.03em">A</text>
  <!-- Superscript 1 -->
  <text
    x="258" y="128"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="600"
    font-size="52"
    fill="rgba(255,255,255,0.85)">1</text>

  <!-- Wordmark below icon -->
  <text
    x="200" y="300"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="52"
    fill="white"
    letter-spacing="-0.02em">AWARE</text>
  <text
    x="200" y="350"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="300"
    font-size="40"
    fill="#00C4B7"
    letter-spacing="0.18em">ONE</text>
</svg>
