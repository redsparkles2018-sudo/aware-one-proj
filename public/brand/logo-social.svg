<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <title>Aware One</title>
  <!-- Background -->
  <rect width="400" height="400" fill="#1E2B3C"/>
  <!-- Teal accent bar at top -->
  <rect width="400" height="10" fill="#00A99D"/>

  <!-- A¹ icon block — centred, slightly larger square -->
  <rect x="120" y="85" width="160" height="160" rx="32" fill="#00A99D"/>

  <!-- A text — sized to fill square comfortably -->
  <text
    x="134" y="220"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="140"
    fill="white"
    letter-spacing="-0.03em">A</text>

  <!-- Superscript 1 — anchored inside square top-right -->
  <text
    x="238" y="130"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="600"
    font-size="46"
    fill="rgba(255,255,255,0.9)">1</text>

  <!-- Wordmark below icon -->
  <text
    x="200" y="310"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="800"
    font-size="52"
    fill="white"
    letter-spacing="-0.02em">AWARE</text>
  <text
    x="200" y="358"
    text-anchor="middle"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-weight="300"
    font-size="38"
    fill="#00C4B7"
    letter-spacing="0.2em">ONE</text>
</svg>
