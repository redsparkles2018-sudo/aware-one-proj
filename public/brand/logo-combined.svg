<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" width="340" height="72" role="img" aria-label="Aware One">
  <title>Aware One</title>
  <defs>
    <style>
      .lc-icon-a { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 44px; fill: white; letter-spacing: -0.03em; }
      .lc-icon-1 { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 18px; fill: rgba(255,255,255,0.85); }
      .lc-name   { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; font-size: 26px; fill: #1E2B3C; letter-spacing: -0.01em; }
      .lc-one    { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 400; font-size: 26px; fill: #00A99D; letter-spacing: -0.01em; }
      .lc-sub    { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 9.5px; fill: #6B7C93; letter-spacing: 0.13em; }
    </style>
  </defs>
  <!-- Icon block -->
  <rect x="0" y="6" width="60" height="60" rx="12" fill="#00A99D"/>
  <text class="lc-icon-a" x="6" y="58">A</text>
  <text class="lc-icon-1" x="42" y="24">1</text>
  <!-- Wordmark -->
  <text class="lc-name" x="80" y="40">Aware <tspan class="lc-one">One</tspan></text>
  <text class="lc-sub"  x="80" y="56">BUSINESS CONSULTANCY</text>
</svg>
